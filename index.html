<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Adventure Quiz v13</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero card">
      <div>
        <p class="eyebrow">Single Player Quiz</p>
        <h1>Math Adventure Quiz</h1>
        <p class="subtitle">Arithmetic, times tables, geometry, patterns, area, perimeter, word problems, and reading comprehension.</p>
      </div>
      <div class="score-box">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
    </section>

    <section id="setupScreen" class="card setup-screen">
      <h2>Choose your challenge</h2>
      <label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>

      <label for="category">Category</label>
      <select id="category">
        <option value="arithmetic" selected>Arithmetic only</option>
        <option value="multiplication">Multiplication only</option>
        <option value="mixed">Everything else</option>
        <option value="reading">Reading Comprehension</option>
      </select>

      <label for="questionCount">Number of questions</label>
      <select id="questionCount">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
        <option value="20">20</option>
      </select>

      <button id="startBtn" class="primary-btn">Start Quiz</button>
    </section>

    <section id="quizScreen" class="card quiz-screen hidden">
      <div class="quiz-topline">
        <span id="questionCounter">Question 1 of 10</span>
        <span id="skillBadge" class="badge">Arithmetic</span>
      </div>

      <div id="visualArea" class="visual-area hidden"></div>
      <h2 id="questionText">Question goes here</h2>
      <div id="answerArea" class="answer-area"></div>
      <div id="feedback" class="feedback"></div>

      <div class="actions">
        <button id="submitBtn" class="primary-btn">Submit</button>
        <button id="nextBtn" class="secondary-btn hidden">Next</button>
      </div>
    </section>

    <section id="resultScreen" class="card result-screen hidden">
      <h2>Quiz complete!</h2>
      <p id="finalScore" class="final-score"></p>
      <p id="finalMessage"></p>
      <div class="actions result-actions">
        <button id="miniGameBtn" class="primary-btn hidden" disabled>Play 1-Minute Mini Game</button>
        <button id="restartBtn" class="secondary-btn">Play Quiz Again</button>
      </div>
    </section>

    <section id="gameScreen" class="card game-screen hidden">
      <div class="game-header">
        <div>
          <p class="eyebrow">Reward Mini Game</p>
          <h2 id="gameTitle">Mini Game</h2>
          <p id="gameInstructions" class="subtitle"></p>
        </div>
        <div class="game-stats">
          <span>Time</span>
          <strong id="gameTimer">60</strong>
          <span>Score</span>
          <strong id="gameScore">0</strong>
        </div>
      </div>
      <canvas id="gameCanvas" width="760" height="420" aria-label="mini game canvas"></canvas>
      <div class="actions">
        <button id="readyGameBtn" class="primary-btn hidden">Ready?</button>
        <button id="stopGameBtn" class="secondary-btn">End Game</button>
        <button id="backToResultsBtn" class="secondary-btn hidden">Back to Results</button>
      </div>
    </section>
  </main>

  <script src="script.js?v=13"></script>
</body>
</html>

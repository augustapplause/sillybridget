<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kids Math Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-card">
        <h1>🧮 Kids Math Master</h1>
        <div id="settings">
            <label>Age: <input type="range" id="age" min="5" max="12" value="7" oninput="updateAge(this.value)"> <span id="ageVal">7</span></label>
            <select id="category" onchange="resetQuiz()">
                <option value="Arithmetic">Arithmetic</option>
                <option value="Time">Time</option>
                <option value="Geometry">Geometry</option>
            </select>
        </div>
        <div id="quiz-area">
            <h2 id="question">Loading...</h2>
            <div id="visual-area"></div>
            <div id="input-area"></div>
            <button id="submit-btn" onclick="checkAnswer()">Submit</button>
            <p id="feedback"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kids Math Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧮 Kids Math Master</h1>
        <div class="settings">
            <label>Age: <input type="range" id="age" min="5" max="12" value="7" oninput="document.getElementById('ageVal').innerText = this.value"> <span id="ageVal">7</span></label>
            <select id="category">
                <option value="Arithmetic">Arithmetic</option>
                <option value="Time">Time</option>
                <option value="Geometry">Geometry</option>
            </select>
            <button onclick="resetQuiz()">Start/Reset</button>
        </div>
    </header>
    <main class="quiz-card">
        <h2 id="question">Select category and click Start!</h2>
        <div id="visual-area"></div>
        <div id="input-area"></div>
        <button id="submit-btn" onclick="checkAnswer()">Submit</button>
        <p id="feedback"></p>
    </main>
    <script src="script.js"></script>
</body>
</html>
